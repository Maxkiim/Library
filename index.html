<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Document</title>
</head>
<body>
    <nav class="navbar">
        <section class="title">
            <h1><i data-lucide="library"></i>  My Library</h1>
            <p>Keep track of your reading collection</p>
        </section>
        <button id="new-book"><i data-lucide="book-plus"></i>Add Book</button>
        <section id="book-dialog" class="hidden">
            <form action="" method="get">
                <label for="Title">Title:</label>
                <input type="text" id="Title" placeholder="Enter Book Title">
                <label for="Author">Author:</label>
                <input type="text" id="Author" placeholder="Enter Author Name">
                <label for="Pages">Pages:</label>
                <input type="number" id="Pages" placeholder="Enter Page Count">
                <label for="Read">Read:</label>
                <div class="checkbox-read">
                    <input type="checkbox" id="Read">
                    <p>I've already read this book</p>
                </div>
                <div class="form-btns">
                    <button id="submit-book">Add Book</button>
                    <button id="cancel-book">Cancel</button>
                </div>

            </form>
        </section>
    </nav>
    <section id="book-cards">
        <h1>space</h1>
    </section>
    <script src="script.js"></script>
</body>
</html>
